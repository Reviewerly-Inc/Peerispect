version: '3.8'

services:
  peerispect:
    build: .
    restart: always
    ports:
      - "5015:5015"
    environment:
      # Use the shared vLLM service on the openalex-network
      - VLLM_API_URL=http://vllm:8000/v1
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./outputs:/src/outputs
      - ./api_cache:/src/api_cache
    runtime: nvidia
    networks:
      - openalex-network

networks:
  openalex-network:
    external: true